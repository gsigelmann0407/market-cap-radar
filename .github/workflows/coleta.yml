name: Coleta diária — Market Cap Radar

on:
  schedule:
    - cron: '0 14 * * *'   # 14:00 UTC — abertura NY (principal)
    - cron: '30 14 * * *'  # 14:30 UTC — backup abertura
    - cron: '0 15 * * *'   # 15:00 UTC — backup abertura
    - cron: '0 21 * * *'   # 21:00 UTC — fechamento NY (principal)
    - cron: '30 21 * * *'  # 21:30 UTC — backup fechamento
    - cron: '0 22 * * *'   # 22:00 UTC — backup fechamento
  workflow_dispatch:         # permite disparar manualmente pelo GitHub

jobs:
  coletar:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install requests beautifulsoup4 lxml yfinance pandas

      - name: Rodar coletor
        run: python coletor_yfinance.py
